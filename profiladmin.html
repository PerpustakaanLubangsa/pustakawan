<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profil Admin - Edit Pustakawan</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #121212;
      color: white;
      margin: 0;
      padding: 16px;
    }
    h1 {
      text-align: center;
      margin-bottom: 16px;
    }
    #profilBox {
      max-width: 500px;
      margin: 0 auto;
    }
    #foto {
      width: 100px;
      border-radius: 50%;
      display: block;
      margin: 0 auto 24px;
    }
    .info {
      margin-bottom: 16px;
    }
    .info label {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
      text-align: left;
    }
    .info input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      background: #2a2a2a;
      color: white;
      border: 1px solid #555;
      border-radius: 6px;
    }
    .info input:focus {
      outline: none;
      border-color: #1e88e5;
    }
    #simpanBtn {
      margin-top: 30px;
      width: 100%;
      padding: 12px;
      background: #1e88e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    #notif {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: #fdd835;
    }
  </style>
</head>
<body>
  <h1>Profil Admin</h1>
  <div id="profilBox">
    <img id="foto" src="1.png" alt="Foto Pustakawan" />

    <div class="info"><label>ID</label><input id="fid" readonly /></div>
    <div class="info"><label>Nama</label><input id="fnama" /></div>
    <div class="info"><label>Anggota Sejak</label><input id="fsejak" readonly /></div>
    <div class="info"><label>Jabatan</label><input id="fjabatan" /></div>
    <div class="info"><label>Nomor Telepon</label><input id="ftelepon" /></div>
    <div class="info"><label>Alamat</label><input id="falamat" /></div>
    <div class="info"><label>Tempat Tanggal Lahir</label><input id="fttl" /></div>
    <div class="info"><label>Instagram</label><input id="fig" /></div>
    <div class="info"><label>Facebook</label><input id="ffb" /></div>
    <div class="info"><label>TikTok</label><input id="ftiktok" /></div>

    <button id="simpanBtn">Simpan</button>
    <div id="notif"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getDatabase, ref, get, update
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDguC7UH1JUzBQu1JZX8qPJGVeb6Pc7t98",
      authDomain: "pustakawan-26664.firebaseapp.com",
      projectId: "pustakawan-26664",
      storageBucket: "pustakawan-26664.firebasestorage.app",
      messagingSenderId: "284579513964",
      appId: "1:284579513964:web:b45f73ac287e1f49eeba49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(location.search);
    const id = urlParams.get("id");

    const refs = {
      fid: document.getElementById("fid"),
      fnama: document.getElementById("fnama"),
      fsejak: document.getElementById("fsejak"),
      fjabatan: document.getElementById("fjabatan"),
      ftelepon: document.getElementById("ftelepon"),
      falamat: document.getElementById("falamat"),
      fttl: document.getElementById("fttl"),
      fig: document.getElementById("fig"),
      ffb: document.getElementById("ffb"),
      ftiktok: document.getElementById("ftiktok")
    };

    const notif = document.getElementById("notif");
    const simpanBtn = document.getElementById("simpanBtn");

    function tampilNotif(teks, warna = "#fdd835") {
      notif.textContent = teks;
      notif.style.color = warna;
    }

    async function muatData() {
      if (!id) {
        tampilNotif("ID tidak ditemukan.", "red");
        return;
      }

      const refData = ref(db, `pustakawan/${id}`);
      const snap = await get(refData);

      if (snap.exists()) {
        const data = snap.val();
        refs.fid.value = id;
        refs.fnama.value = data.nama || "";
        refs.fsejak.value = new Date(data.sejak || Date.now()).toLocaleDateString("id-ID");
        refs.fjabatan.value = data.jabatan || "";
        refs.ftelepon.value = data.telepon || "";
        refs.falamat.value = data.alamat || "";
        refs.fttl.value = data.ttl || "";
        refs.fig.value = data.ig || "";
        refs.ffb.value = data.fb || "";
        refs.ftiktok.value = data.tiktok || "";
      } else {
        tampilNotif("Profil tidak ditemukan.", "red");
      }
    }

    simpanBtn.onclick = async () => {
      const dataBaru = {
        nama: refs.fnama.value.trim(),
        jabatan: refs.fjabatan.value.trim(),
        telepon: refs.ftelepon.value.trim(),
        alamat: refs.falamat.value.trim(),
        ttl: refs.fttl.value.trim(),
        ig: refs.fig.value.trim(),
        fb: refs.ffb.value.trim(),
        tiktok: refs.ftiktok.value.trim()
      };

      await update(ref(db, `pustakawan/${id}`), dataBaru);
      tampilNotif("✔️ Data berhasil diperbarui.", "#4caf50");
    };

    muatData();
  </script>
</body>
</html>
