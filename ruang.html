<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ruang Chat</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: #121212;
      color: white;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
    }

    #container {
      flex: 1;
      display: flex;
      height: 100%;
      overflow: hidden;
    }

    #sidebar {
      width: 250px;
      background: #1e1e1e;
      overflow-y: auto;
      border-right: 1px solid #333;
      transition: transform 0.3s ease;
    }

    #sidebar.hidden {
      transform: translateX(-100%);
      position: absolute;
      z-index: 100;
      top: 0;
      left: 0;
      height: 100%;
    }

    #toggleSidebar {
      display: none;
      position: absolute;
      top: 10px;
      left: 10px;
      background: #1e88e5;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 16px;
      z-index: 110;
    }

    .kontak {
      padding: 10px 16px;
      border-bottom: 1px solid #333;
      cursor: pointer;
      position: relative;
    }

    .kontak:hover {
      background: #2c2c2c;
    }

    .kontak.aktif {
      background: #2a2a2a;
      border-left: 4px solid #1e88e5;
    }

    .kontak-nama {
      font-weight: bold;
    }

    .kontak-preview {
      font-size: 13px;
      color: #aaa;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      position: absolute;
      right: 16px;
      top: 14px;
      background: red;
      color: white;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 999px;
      display: none;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
    }

    #header {
      padding: 14px 50px 14px 20px;
      background: #1e88e5;
      font-size: 18px;
      font-weight: bold;
      position: relative;
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 8px;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.4em;
    }

    .me {
      background: #1e88e5;
      margin-left: auto;
      text-align: left;
      color: white;
    }

    .other {
      background: #2e2e2e;
      margin-right: auto;
      text-align: left;
      color: white;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      border-top: 1px solid #333;
      background: #1a1a1a;
    }

    #pesanInput {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    #kirimBtn {
      margin-left: 10px;
      background: #1e88e5;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    #lihatProfilBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #1e88e5;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      z-index: 10;
    }

    @media (max-width: 768px) {
      #toggleSidebar {
        display: block;
      }

      #sidebar {
        position: absolute;
        transform: translateX(-100%);
      }

      #sidebar.show {
        transform: translateX(0);
        z-index: 100;
      }
    }
  </style>
</head>
<body>
  <button id="toggleSidebar">☰</button>
  <div id="container">
    <div id="sidebar"></div>

    <div id="main">
      <button id="lihatProfilBtn">Lihat Profil</button>
      <div id="header">Ruang Umum</div>
      <div id="chatBox"></div>
      <div id="inputArea">
        <input type="text" id="pesanInput" placeholder="Ketik pesan..." />
        <button id="kirimBtn">Kirim</button>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      set,
      onChildAdded,
      onValue,
      off,
      get,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDguC7UH1JUzBQu1JZX8qPJGVeb6Pc7t98",
      authDomain: "pustakawan-26664.firebaseapp.com",
      projectId: "pustakawan-26664",
      storageBucket: "pustakawan-26664.appspot.com",
      messagingSenderId: "284579513964",
      appId: "1:284579513964:web:b45f73ac287e1f49eeba49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(location.search);
    const currentId = urlParams.get("id") || "anonim";
    let tujuanId = "umum";
    let tujuanNama = "Ruang Umum";
    let listenerRef = null;

    const header = document.getElementById("header");
    const chatBox = document.getElementById("chatBox");
    const pesanInput = document.getElementById("pesanInput");
    const kirimBtn = document.getElementById("kirimBtn");
    const sidebar = document.getElementById("sidebar");

    // Tombol toggle sidebar hanya untuk HP
    const toggleBtn = document.getElementById("toggleSidebar");
    toggleBtn.onclick = () => {
      sidebar.classList.toggle("show");
    };

    document.getElementById("lihatProfilBtn").onclick = () => {
      window.location.href = `profil.html?id=${currentId}`;
    };

    function gabungId(a, b) {
      return [a, b].sort().join("_");
    }

    function simpanTerakhirBaca(jalurChat) {
      update(ref(db, `terakhirBaca/${currentId}`), {
        [jalurChat]: Date.now()
      });
    }

    function pilihKontak(id, nama) {
      tujuanId = id;
      tujuanNama = nama;
      header.textContent = nama;

      sidebar.classList.remove("show");

      document.querySelectorAll(".kontak").forEach(el => {
        el.classList.remove("aktif");
        if ((id === "umum" && el.dataset.id === "umum") || el.dataset.id === id) {
          el.classList.add("aktif");
          const badge = el.querySelector(".badge");
          badge.textContent = "";
          badge.style.display = "none";
        }
      });

      const jalurChat = id === "umum" ? "umum" : gabungId(currentId, id);
      simpanTerakhirBaca(jalurChat);
      muatChat();
    }

    function muatChat() {
      chatBox.innerHTML = "";
      if (listenerRef) off(listenerRef);
      const jalur = tujuanId === "umum" ? "chat/umum" : `chat_pribadi/${gabungId(currentId, tujuanId)}`;
      const chatRef = ref(db, jalur);
      listenerRef = chatRef;

      onChildAdded(chatRef, snap => {
        const data = snap.val();
        const div = document.createElement("div");
        div.className = "bubble " + (data.dari === currentId ? "me" : "other");
        div.textContent = data.teks;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      });
    }

    kirimBtn.onclick = async () => {
      const teks = pesanInput.value.trim();
      if (!teks) return;

      const jalur = tujuanId === "umum" ? "chat/umum" : `chat_pribadi/${gabungId(currentId, tujuanId)}`;
      const batas = tujuanId === "umum" ? 100 : 150;
      const chatRef = ref(db, jalur);

      const snap = await get(chatRef);
      if (snap.exists()) {
        const pesanList = Object.entries(snap.val());
        if (pesanList.length >= batas) {
          const pertama = pesanList[0][0];
          await set(ref(db, `${jalur}/${pertama}`), null);
        }
      }

      const newRef = push(chatRef);
      await set(newRef, {
        dari: currentId,
        teks,
        waktu: Date.now()
      });

      pesanInput.value = "";
    };

    async function bangunSidebar() {
      sidebar.innerHTML = "";
      const kontakRef = ref(db, "pustakawan");
      const snap = await get(kontakRef);
      const pustakawan = snap.exists() ? snap.val() : {};

      const buatItem = (id, nama, jalurChat) => {
        const div = document.createElement("div");
        div.className = "kontak";
        div.dataset.id = id;

        const namaEl = document.createElement("div");
        namaEl.className = "kontak-nama";
        namaEl.textContent = nama;

        const previewEl = document.createElement("div");
        previewEl.className = "kontak-preview";
        previewEl.textContent = "Belum ada pesan";

        const badge = document.createElement("span");
        badge.className = "badge";

        div.appendChild(namaEl);
        div.appendChild(previewEl);
        div.appendChild(badge);
        div.onclick = () => pilihKontak(id, nama);

        sidebar.appendChild(div);

        const chatRef = ref(db, jalurChat);
        const jalurBaca = id === "umum" ? "umum" : gabungId(currentId, id);
        const bacaRef = ref(db, `terakhirBaca/${currentId}/${jalurBaca}`);

        onValue(chatRef, snap => {
          let pesanList = [];
          if (snap.exists()) {
            pesanList = Object.entries(snap.val());
            const terakhir = pesanList[pesanList.length - 1][1];
            previewEl.textContent = terakhir.teks;
          } else {
            previewEl.textContent = "Belum ada pesan";
          }

          get(bacaRef).then(bacaSnap => {
            const waktuBaca = bacaSnap.exists() ? bacaSnap.val() : 0;
            let belumDibaca = 0;
            for (const [_, pesan] of pesanList) {
              if (pesan.waktu > waktuBaca && pesan.dari !== currentId) {
                belumDibaca++;
              }
            }

            if (belumDibaca > 0 && tujuanId !== id) {
              badge.textContent = belumDibaca;
              badge.style.display = "inline-block";
            } else {
              badge.textContent = "";
              badge.style.display = "none";
            }
          });
        });
      };

      buatItem("umum", "Ruang Umum", "chat/umum");

      for (const id in pustakawan) {
        if (id === currentId) continue;
        const nama = pustakawan[id].nama || id;
        const jalurChat = `chat_pribadi/${gabungId(currentId, id)}`;
        buatItem(id, nama, jalurChat);
      }
    }

    bangunSidebar();
    muatChat();
  </script>
</body>
</html>
