<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profil Pustakawan</title>
  <style>
    body {
      background: #121212;
      color: white;
      font-family: sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    #profilBox {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      max-width: 480px;
      margin: auto;
    }
    #foto {
      display: block;
      margin: 0 auto 20px;
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 100px;
      border: 2px solid #444;
    }
    .info {
      margin: 10px 0;
      text-align: left;
    }
    .info label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      color: #bbb;
    }
    .info input {
      padding: 8px;
      width: 100%;
      border-radius: 6px;
      border: none;
      background: #2a2a2a;
      color: white;
    }
    #simpanBtn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background: #1e88e5;
      border: none;
      color: white;
      border-radius: 6px;
      width: 100%;
      cursor: pointer;
    }
    #simpanBtn:hover {
      background: #1565c0;
    }
    #notif {
      margin-top: 12px;
      text-align: center;
      color: #fdd835;
      font-size: 14px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>Profil Pustakawan</h1>
  <div id="profilBox">
    <img id="foto" src="1.png" alt="Foto Pustakawan" />
    <div class="info">
      <label>ID</label>
      <input type="text" id="id" readonly />
    </div>
    <div class="info">
      <label>Nama</label>
      <input type="text" id="nama" />
    </div>
    <div class="info">
      <label>Anggota Sejak</label>
      <input type="text" id="sejak" />
    </div>
    <div class="info">
      <label>Jabatan</label>
      <input type="text" id="jabatan" />
    </div>
    <div class="info">
      <label>Nomor Telepon</label>
      <input type="text" id="telepon" />
    </div>
    <div class="info">
      <label>Alamat</label>
      <input type="text" id="alamat" />
    </div>
    <div class="info">
      <label>Tempat Tanggal Lahir</label>
      <input type="text" id="ttl" />
    </div>
    <div class="info">
      <label>Instagram</label>
      <input type="text" id="ig" />
    </div>
    <div class="info">
      <label>Facebook</label>
      <input type="text" id="fb" />
    </div>
    <div class="info">
      <label>TikTok</label>
      <input type="text" id="tiktok" />
    </div>

    <button id="simpanBtn" style="display:none;">Simpan</button>
    <div id="notif"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDguC7UH1JUzBQu1JZX8qPJGVeb6Pc7t98",
      authDomain: "pustakawan-26664.firebaseapp.com",
      projectId: "pustakawan-26664",
      storageBucket: "pustakawan-26664.firebasestorage.app",
      messagingSenderId: "284579513964",
      appId: "1:284579513964:web:b45f73ac287e1f49eeba49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const isAdmin = params.get("admin") === "1";

    const idInput = document.getElementById("id");
    const namaInput = document.getElementById("nama");
    const sejakInput = document.getElementById("sejak");
    const jabatanInput = document.getElementById("jabatan");
    const teleponInput = document.getElementById("telepon");
    const alamatInput = document.getElementById("alamat");
    const ttlInput = document.getElementById("ttl");
    const igInput = document.getElementById("ig");
    const fbInput = document.getElementById("fb");
    const tiktokInput = document.getElementById("tiktok");
    const simpanBtn = document.getElementById("simpanBtn");
    const notif = document.getElementById("notif");

    function tampilNotif(teks, warna="#fdd835") {
      notif.textContent = teks;
      notif.style.color = warna;
    }

    async function muatProfil() {
      if (!id) {
        tampilNotif("ID tidak ditemukan.");
        return;
      }

      const snap = await get(ref(db, `pustakawan/${id}`));
      if (!snap.exists()) {
        tampilNotif("Profil tidak ditemukan.");
        return;
      }

      const data = snap.val();
      idInput.value = id;
      namaInput.value = data.nama || "";
      sejakInput.value = data.sejak || "";
      jabatanInput.value = data.jabatan || "";
      teleponInput.value = data.telepon || "";
      alamatInput.value = data.alamat || "";
      ttlInput.value = data.ttl || "";
      igInput.value = data.ig || "";
      fbInput.value = data.fb || "";
      tiktokInput.value = data.tiktok || "";

      if (!isAdmin) {
        // Non-admin tidak bisa edit
        [namaInput, sejakInput, jabatanInput, teleponInput, alamatInput, ttlInput, igInput, fbInput, tiktokInput].forEach(input => {
          input.setAttribute("readonly", true);
        });
      } else {
        simpanBtn.style.display = "block";
      }
    }

    simpanBtn.onclick = async () => {
      const dataBaru = {
        nama: namaInput.value.trim(),
        sejak: sejakInput.value.trim(),
        jabatan: jabatanInput.value.trim(),
        telepon: teleponInput.value.trim(),
        alamat: alamatInput.value.trim(),
        ttl: ttlInput.value.trim(),
        ig: igInput.value.trim(),
        fb: fbInput.value.trim(),
        tiktok: tiktokInput.value.trim()
      };

      await update(ref(db, `pustakawan/${id}`), dataBaru);
      tampilNotif("✅ Profil berhasil disimpan", "#4caf50");
    };

    muatProfil();
  </script>
</body>
</html>
