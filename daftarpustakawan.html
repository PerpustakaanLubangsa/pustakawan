<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar Pustakawan</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #121212;
      color: white;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-box {
      width: 100%;
      max-width: 360px;
      background: #1e1e1e;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 22px;
    }
    input {
      width: 100%;
      padding: 12px;
      background: #2a2a2a;
      border: none;
      border-bottom: 2px solid #555;
      color: white;
      font-size: 16px;
      border-radius: 4px;
      margin-bottom: 16px;
    }
    input:focus {
      outline: none;
      border-bottom: 2px solid #1e88e5;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #1e88e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    #notif {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #fdd835;
    }
  </style>
</head>
<body>
  <div class="form-box">
    <h1>Daftar Pustakawan</h1>
    <input type="text" id="id" placeholder="ID Pustakawan (bebas)" />
    <input type="text" id="nama" placeholder="Nama lengkap" />
    <button onclick="daftar()">Daftar</button>
    <div id="notif"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getDatabase, ref, get, set
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDguC7UH1JUzBQu1JZX8qPJGVeb6Pc7t98",
      authDomain: "pustakawan-26664.firebaseapp.com",
      projectId: "pustakawan-26664",
      storageBucket: "pustakawan-26664.firebasestorage.app",
      messagingSenderId: "284579513964",
      appId: "1:284579513964:web:b45f73ac287e1f49eeba49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const notif = document.getElementById("notif");

    function tampilNotif(teks, warna = "#fdd835") {
      notif.textContent = teks;
      notif.style.color = warna;
    }

    window.daftar = async function() {
      const id = document.getElementById("id").value.trim();
      const nama = document.getElementById("nama").value.trim();

      if (!id || !nama) {
        tampilNotif("ID dan Nama tidak boleh kosong.");
        return;
      }

      const refPus = ref(db, `pustakawan/${id}`);
      const snap = await get(refPus);

      if (snap.exists()) {
        tampilNotif("❌ ID sudah digunakan. Gunakan ID lain.", "red");
        return;
      }

      await set(refPus, {
        nama: nama,
        sejak: Date.now()
      });

      tampilNotif(`✔️ Berhasil daftar. ID: ${id}`, "#4caf50");
      document.getElementById("id").value = "";
      document.getElementById("nama").value = "";
    };
  </script>
</body>
</html>
