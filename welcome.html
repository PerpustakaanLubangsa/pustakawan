<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Selamat Datang</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #121212;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }

    .welcome-box {
      max-width: 480px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1s ease-out forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 26px;
      margin-bottom: 12px;
      animation: fadeIn 1.2s ease-out;
    }

    #namaUser {
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-top: 16px;
      color: white;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.6s forwards;
      word-break: break-word;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    p {
      font-size: 14px;
      color: #ccc;
      margin-top: 24px;
      animation: fadeIn 1.5s ease-out;
    }
  </style>
</head>
<body>
  <div class="welcome-box">
    <h1>Welcome to Pustakawan Site!</h1>
    <div id="namaUser"></div>
    <p>Anda akan diarahkan ke halaman utama...</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDguC7UH1JUzBQu1JZX8qPJGVeb6Pc7t98",
      authDomain: "pustakawan-26664.firebaseapp.com",
      projectId: "pustakawan-26664",
      storageBucket: "pustakawan-26664.appspot.com",
      messagingSenderId: "284579513964",
      appId: "1:284579513964:web:b45f73ac287e1f49eeba49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const namaUserEl = document.getElementById("namaUser");

    if (id) {
      const refUser = ref(db, `pustakawan/${id}`);
      get(refUser).then(snapshot => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          namaUserEl.textContent = data.nama || `Halo, ${id}`;
        } else {
          namaUserEl.textContent = `Halo, ${id}`;
        }
      }).catch(() => {
        namaUserEl.textContent = `Halo, ${id}`;
      });
    }

    setTimeout(() => {
      if (id) {
        location.href = `beranda.html?id=${id}`;
      } else {
        location.href = "beranda.html";
      }
    }, 5000);
  </script>
</body>
</html>
