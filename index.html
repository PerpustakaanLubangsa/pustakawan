<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Pustakawan</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #121212;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      background: #1e1e1e;
      padding: 32px 24px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.5);
      text-align: center;
    }
    .login-box h1 {
      margin-bottom: 24px;
      font-size: 24px;
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 16px;
      background: #2c2c2c;
      border: 1px solid #444;
      color: white;
      border-radius: 6px;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #121212;
      color: white;
      margin-bottom: 12px;
      transition: background 0.3s;
    }
    .login-box button:hover {
      background: #1565c0;
    }
    .guest-btn {
      background: #121212;
      color: #bbb;
      border: none;
      padding: 10px;
      font-size: 14px;
      text-decoration: underline;
      cursor: pointer;
      transition: color 0.3s;
    }
    .guest-btn:hover {
      color: white;
    }
    .login-box small {
      display: block;
      margin-top: 12px;
      color: #888;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Login Pustakawan</h1>
    <input
      type="text"
      id="idInput"
      placeholder="Masukkan ID Pustakawan"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      autofocus
    />
    <button onclick="masuk()">Masuk</button>
    <button class="guest-btn" onclick="masukTamu()">Masuk sebagai Tamu</button>
    <small>Hanya pustakawan terdaftar yang dapat login langsung.</small>
  </div>

  <script>
    function masuk() {
      const id = document.getElementById("idInput").value.trim();
      if (id) {
        location.href = `welcome.html?id=${id}`;
      } else {
        alert("Silakan masukkan ID terlebih dahulu.");
      }
    }

    function masukTamu() {
      location.href = "welcome.html";
    }
  </script>
</body>
</html>
