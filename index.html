<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Pustakawan</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #121212;
      color: white;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      background: #1e1e1e;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 22px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
    }
    input {
      background: #2a2a2a;
      color: white;
      border: 1px solid #444;
    }
    input:focus {
      outline: none;
      border-color: #1e88e5;
      background: #2f2f2f;
    }
    button {
      background: #1e88e5;
      color: white;
      cursor: pointer;
    }
    #notif {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #fdd835;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Login Pustakawan</h1>
    <div class="form-group">
      <input type="text" id="id" placeholder="Masukkan ID Pustakawan" autofocus />
      <button onclick="login()">Masuk</button>
    </div>
    <div id="notif"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDguC7UH1JUzBQu1JZX8qPJGVeb6Pc7t98",
      authDomain: "pustakawan-26664.firebaseapp.com",
      projectId: "pustakawan-26664",
      storageBucket: "pustakawan-26664.firebasestorage.app",
      messagingSenderId: "284579513964",
      appId: "1:284579513964:web:b45f73ac287e1f49eeba49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const notif = document.getElementById("notif");
    const input = document.getElementById("id");

    function tampilNotif(teks, warna = "#fdd835") {
      notif.textContent = teks;
      notif.style.color = warna;
    }

    async function login() {
      const id = input.value.trim();
      if (!id) {
        tampilNotif("ID tidak boleh kosong.");
        return;
      }

      const refData = ref(db, `pustakawan/${id}`);
      const snap = await get(refData);

      if (snap.exists()) {
        window.location.href = `ruang.html?id=${id}`;
      } else {
        tampilNotif("❌ ID tidak ditemukan.");
      }
    }

    window.onload = () => input.focus();
  </script>
</body>
</html>
